name: Bug Report
description: Report an Issue or Bug with the Laravel Setting
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        We're sorry to hear you have a problem. Can you help us solve it by providing the following details.
  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: What did you expect to happen?
      placeholder: When I try to dispatch or get a setting, I get an incorrect result
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: How to Reproduce
      description: How did this occur, please add any command or code used and provide a set of reliable steps if possible.
      placeholder: |
        Using Setting facade:
        use JobMetric\Setting\Facades\Setting as SettingFacade;
        
        SettingFacade::dispatch('config', [
            'config_name' => 'job metric',
            'config_url' => 'jobmetric.net',
        ]);
        
        $config_name = SettingFacade::get('config_name');
        
        Or using helper functions:
        dispatchSetting('config', [
            'config_name' => 'job metric',
        ]);
        
        $config_name = getSetting('config_name');
    validations:
      required: true
  - type: input
    id: expected-output
    attributes:
      label: Expected Output
      description: What output did you expect to receive?
      placeholder: "Setting should be stored successfully or retrieved correctly"
    validations:
      required: true
  - type: input
    id: actual-output
    attributes:
      label: Actual Output
      description: What output did you actually receive?
      placeholder: "Dispatch or get operation fails or throws an exception"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: What version of Laravel Setting are you running? Please be as specific as possible
      placeholder: 1.0.0
    validations:
      required: true

